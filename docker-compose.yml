# Local/dev stack. Production: see docs/01-deployment-zimbabwe.md
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: jonomi
      POSTGRES_PASSWORD: jonomi_dev
      POSTGRES_DB: jonomi_platform
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]
  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql://jonomi:jonomi_dev@db:5432/jonomi_platform
      JWT_SECRET: dev-only-secret
    depends_on: [db]
    ports: ["4000:4000"]
volumes:
  pgdata:
