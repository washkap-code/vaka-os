name: VAKA quality gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-isolation:
    name: Tenant isolation regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jonomi
          POSTGRES_PASSWORD: jonomi_ci
          POSTGRES_DB: jonomi_tenant_isolation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jonomi -d jonomi_tenant_isolation_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://jonomi:jonomi_ci@127.0.0.1:5432/jonomi_tenant_isolation_test
      JWT_SECRET: ci-only-vaka-jwt-secret-not-for-production-2026
      CAPTURE_ENCRYPTION_KEY: ci-only-capture-encryption-key-not-for-production
      MFA_ENCRYPTION_KEY: ci-only-mfa-encryption-key-not-for-production
      PAYNOW_ENCRYPTION_KEY: ci-only-paynow-encryption-key-not-for-production
      PLATFORM_ADMIN_PASSWORD: CI-Only-Platform-Password-2026
      NODE_ENV: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci --workspaces=false --ignore-scripts

      - name: Replay migrations and verify schema drift
        working-directory: server
        run: npm run test:db:migrations

      - name: Seed required reference data
        working-directory: server
        run: node --import tsx src/seed.ts

      - name: Run tenant-isolation regression suite
        working-directory: server
        run: npm run test:tenant-isolation

  verify:
    name: Type, build, tests, and AI foundations
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jonomi
          POSTGRES_PASSWORD: jonomi_ci
          POSTGRES_DB: jonomi_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jonomi -d jonomi_platform_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://jonomi:jonomi_ci@127.0.0.1:5432/jonomi_platform_test
      JWT_SECRET: ci-only-vaka-jwt-secret-not-for-production-2026
      CAPTURE_ENCRYPTION_KEY: ci-only-capture-encryption-key-not-for-production
      MFA_ENCRYPTION_KEY: ci-only-mfa-encryption-key-not-for-production
      PAYNOW_ENCRYPTION_KEY: ci-only-paynow-encryption-key-not-for-production
      PLATFORM_ADMIN_PASSWORD: CI-Only-Platform-Password-2026
      NODE_ENV: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            web/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci --workspaces=false --ignore-scripts

      - name: Install web dependencies
        working-directory: web
        run: npm ci --workspaces=false --ignore-scripts

      - name: Replay migrations and verify schema drift
        working-directory: server
        run: npm run test:db:migrations

      - name: Seed required reference data
        working-directory: server
        run: node --import tsx src/seed.ts

      - name: Install PostgreSQL backup client tools
        run: |
          if ! command -v pg_dump >/dev/null || ! command -v pg_restore >/dev/null; then
            sudo apt-get update
            sudo apt-get install --yes postgresql-client
          fi

      - name: Verify backup round trip and production safety rail
        run: bash scripts/tests/backup-restore.test.sh

      - name: Type-check server and web
        run: npm run typecheck

      - name: Check design-token conformance
        run: npm run test:design-tokens

      - name: Check accessibility conformance
        run: npm run test:accessibility

      - name: Check product-entry contracts
        run: npm run test:product-entry

      - name: Check invoice-workspace lifecycle contracts
        run: npm run test:invoice-workspace

      - name: Check homepage regression contracts
        run: npm run test:homepage

      - name: Build web
        run: npm run build

      - name: Run PostgreSQL and foundation tests
        run: npm test

      - name: Generate intentionally gated evaluation example
        working-directory: server
        shell: bash
        run: |
          set +e
          npm run ai:evaluate -- \
            --input fixtures/ai-evaluation/candidates.example.json \
            --allow-partial \
            --json artifacts/ai-evaluation/example-report.json \
            --markdown artifacts/ai-evaluation/example-report.md
          evaluation_status=$?
          set -e
          if [ "$evaluation_status" -ne 1 ]; then
            echo "Expected the partial, human-review-pending example to exit with status 1."
            exit 1
          fi

      - name: Upload AI evaluation evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: vaka-ai-evaluation-${{ github.run_id }}
          path: server/artifacts/ai-evaluation/
          if-no-files-found: warn
          retention-days: 30
